name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/mobile
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Seed mobile env
        run: cp .env.example .env
      - name: Install mobile deps
        run: flutter pub get
      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test --coverage
      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: app/mobile/coverage/lcov.info

  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.9'
          cache: true
      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet gateway
        run: go vet ./...
      - name: Test gateway
        run: go test -race -shuffle=on -cover ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
