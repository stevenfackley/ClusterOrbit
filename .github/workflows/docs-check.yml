name: Docs Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !docs/superpowers/**
            !app/mobile/ios/Runner/Assets.xcassets/**
